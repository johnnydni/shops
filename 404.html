<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Nicht gefunden — RITMO Shop</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="robots" content="noindex,follow">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0A0A0A;color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',sans-serif;
      -webkit-font-smoothing:antialiased}
    body{display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .card{max-width:420px}
    .num{font-size:120px;font-weight:900;font-style:italic;letter-spacing:-3px;
      color:#FF7A1A;line-height:.9;margin-bottom:16px}
    h1{font-size:24px;font-weight:900;font-style:italic;letter-spacing:-.5px;margin:0 0 12px}
    p{color:rgba(255,255,255,.65);font-size:14px;line-height:1.55;margin:0 0 24px}
    .row{display:flex;flex-direction:column;gap:14px;align-items:center}
    a.btn{display:inline-block;padding:14px 22px;
      background:#FF7A1A;color:#000;font-weight:800;text-decoration:none;
      letter-spacing:.3px;box-shadow:0 8px 28px rgba(255,122,26,.4)}
    a.btn:hover{transform:translateY(-1px)}
    a.link{color:rgba(255,255,255,.55);font-size:12px;letter-spacing:.4px;text-decoration:none;
      border-bottom:1px solid rgba(255,255,255,.18);padding-bottom:2px}
    a.link:hover{color:#FF7A1A;border-color:#FF7A1A}
  </style>
</head>
<body>
  <div class="card">
    <div class="num">404</div>
    <h1>Hier ist nichts.</h1>
    <p>Die Seite, die du suchst, existiert nicht. Geh zurück zum Shop
       oder direkt in die App.</p>
    <div class="row">
      <a class="btn" href="/">Zum Shop</a>
      <a class="link" href="https://ritmopadel.app/">ritmopadel.app</a>
    </div>
  </div>
</body>
</html>
