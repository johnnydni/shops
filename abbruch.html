<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Checkout abgebrochen — RITMO Shop</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="robots" content="noindex,follow">
  <link rel="stylesheet" href="assets/css/ritmo.css">
  <style>
    .cancel-page{padding:64px 0 120px;text-align:center;position:relative;overflow:hidden;min-height:60vh}
    .cancel-inner{max-width:560px;margin:0 auto;padding:0 var(--gutter);position:relative;z-index:1}
    .cancel-mark{width:96px;height:96px;margin:0 auto 28px;border:3px solid var(--t2);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      animation:scaleIn .6s var(--ease-out) both}
    .cancel-mark svg{width:42px;height:42px;display:block}
    .cancel-page h1{font-size:clamp(40px,6vw,72px);font-weight:900;font-style:italic;
      letter-spacing:-1.5px;line-height:1;margin-bottom:16px}
    .cancel-page h1 .accent{color:var(--orange)}
    .cancel-page p.lead{color:var(--t2);font-size:16px;line-height:1.6;margin:0 0 32px;
      max-width:46ch;margin-left:auto;margin-right:auto}
    .cancel-links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  </style>
</head>
<body>

  <div class="grain" aria-hidden="true"></div>

  <header class="site-header">
    <div class="wrap topbar">
      <a class="word" href="./"><span>RITMO</span><span class="dot"></span><span class="pipe">·</span><span class="sub">Shop</span></a>
      <nav class="nav">
        <a href="./#sortiment">Sortiment</a>
        <a href="./#newsletter">News</a>
        <a class="cart-link" href="warenkorb.html"><span class="bag"></span><span class="count">0</span></a>
      </nav>
    </div>
  </header>

  <section class="cancel-page">
    <div class="bg-anim" aria-hidden="true">
      <div class="blob-y"></div>
      <div class="blob-b"></div>
      <div class="blob-r"></div>
    </div>
    <div class="cancel-inner fu">
      <div class="cancel-mark">
        <svg viewBox="0 0 32 32" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="3" stroke-linecap="round">
          <path d="M9 9 L23 23 M23 9 L9 23"/>
        </svg>
      </div>
      <h1>Bezahlung <span class="accent">abgebrochen</span>.</h1>
      <p class="lead">
        Kein Problem — dein Warenkorb ist noch da. Du kannst die
        Bestellung jederzeit fortsetzen oder weiter stöbern.
      </p>
      <div class="cancel-links">
        <a class="btn btn-pri" href="warenkorb.html">Zurück zum Warenkorb</a>
        <a class="btn btn-out" href="./">Weiter shoppen</a>
      </div>
    </div>
  </section>

  <footer>
    <div class="wrap foot">
      <div>© <span id="yr">2026</span> RITMO Padel. Made with ♥ in DACH.</div>
      <div>
        <a href="https://ritmopadel.app/" rel="noopener">App</a> &nbsp;·&nbsp;
        <a href="https://ritmopadel.de/" rel="noopener">ritmopadel.de</a> &nbsp;·&nbsp;
        <a href="https://ritmopadel.de/#impressum">Impressum</a>
      </div>
    </div>
  </footer>

  <div class="bauhausline" aria-hidden="true">
    <span class="a"></span><span class="b"></span><span class="c"></span><span class="d"></span><span class="e"></span>
  </div>

  <script src="assets/js/ritmo.js"></script>
</body>
</html>
